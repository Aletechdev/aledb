
upstream django {
    server web:80;
}

server {
    include       mime.types;
    default_type  application/octet-stream;

    listen 80 default_server;

    server_name localhost;

    location /static {
        alias /usr/share/nginx/static;
    }

    location / {
        proxy_set_header Host $host;
        proxy_pass http://django;
    }

}
