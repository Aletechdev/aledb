version: "3"
services:
  db:
    container_name: aledb-database
    image: mysql:5.7
    env_file:
      - ./.docker/db.env
    ports: 
      - 3306:3306
    volumes:
      - ./.docker/data:/docker-entrypoint-initdb.d
  web:
    container_name: aledb-web
    build: .
    env_file:
      - ./.docker/app.env
    volumes:
      - .:/app
      - static:/app/static
    command: "gunicorn aleinfo.wsgi -b 0.0.0.0:80 --reload"
    links:
      - db
    depends_on:
      - db
  nginx:
    container_name: aledb-nginx
    image: nginx
    links:
      - web
    volumes:
      - static:/usr/share/nginx/static:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    command: [nginx-debug, '-g', 'daemon off;']
    ports:
      - "8000:80"
volumes:
  static: