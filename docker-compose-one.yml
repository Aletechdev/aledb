version: "3"
services:
  redis:
    container_name: aledb-redis
    image: redis
    ports:
      - 6379:6379
  web:
    container_name: aledb-web
    build: .
    env_file:
      - .docker/one.env
    volumes:
      - .:/app
      - /data/aledata:/data/aledata
    command: bash -c "python manage.py collectstatic --no-input && gunicorn aleinfo.wsgi -b 0.0.0.0:80 --reload --timeout 300"
  nginx:
    container_name: aledb-nginx
    image: nginx
    links:
      - web
    depends_on:
      - web
    volumes:
      - static:/usr/share/nginx/static:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /data/aledata:/data/aledata:ro
    command: [nginx-debug, '-g', 'daemon off;']
    ports:
      - 8000:80
volumes:
  static:
