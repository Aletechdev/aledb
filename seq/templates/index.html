<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN"
        "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
    <meta charset="utf-8">
    <title>ALE Analytics</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap-theme.min.css">

    <script type="text/javascript" src="/static/jquery-1.9.1.min.js"></script>
    <script type="text/javascript" src="/static/tablesorter/jquery.tablesorter.js"></script>
    <link rel="stylesheet" href="/static/tablesorter/themes/blue/style.css" type="text/css"
          media="print, projection, screen"/>
    <script type="text/javascript">
        var asInitVals = new Array();
        $(document).ready($(function () {
            oTable = $("#runs").tablesorter({widgets: ['zebra']});

        }));
    </script>

</head>

<style>

    body {
        padding-right: 50px;
        padding-bottom: 25px;
        padding-left: 50px;
    }

</style>

<body>

<div class="page-header">
    <div style="float:right"><img src="/static/header.png" style="width:269px;height:53px"></div>
    <h1>ALE Analytics</h1>
</div>

<table id="all mutations" class="tablesorter">
    <thead>
    <tr>
        <th>All Mutations</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td><a href="mutations?ale_experiment_id=all">link</a></td>
    </tbody>

    <table id="runs" class="tablesorter">
        <thead>
        <tr>
            <th>ALE Experiment</th>
            <th>Experiment Executor</th>
            <th>Seq/Reseq Performance</th>
            <th>Meta Data</th>
            <th>Mutations</th>
            <th>Key Mutations</th>
            <th>Lineage</th>
        </tr>
        </thead>
        <tbody>
        {% for experiment in experiments %}
        <tr>
            <td>{{experiment.name}}</td>
            <td>{{experiment.person}}</td>
            <td><a href="lists?ale_experiment_id={{experiment.ale_id}}">link</a></td>
            <td><a href="meta_data?ale_experiment_id={{experiment.ale_id}}">link</a></td>
            <td><a href="mutations?ale_experiment_id={{experiment.ale_id}}">link</a></td>
            <td><a href="key_mutations?ale_experiment_id={{experiment.ale_id}}">link</a></td>
            <td><a href="select_lineage?ale_experiment_id={{experiment.ale_id}}">link</a></td>
            {% endfor %}
        </tbody>
    </table>
</table>

</body>
</html>
