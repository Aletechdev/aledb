    <script type="text/javascript" charset="utf8" src="/static/DataTables/media/js/jquery.dataTables.js"></script>
    <script type="text/javascript" charset="utf8"
            src="/static/DataTables/extras/FixedHeader/js/FixedHeader.js"></script>
    <script type="text/javascript" charset="utf8"
            src="/static/DataTables/extras/ColReorder/media/js/ColReorder.js"></script>
    <script type="text/javascript" charset="utf8"
            src="/static/DataTables/extras/TableTools/media/js/TableTools.min.js"></script>
    <script type="text/javascript">
        $(document).ready(function() {
            var oTable = $("#data").dataTable({"bPaginate": false, "bAutoWidth": false}).fnSort([[1, 'asc']]);
            $("tr td:first-child").each(function () {
	            $(this).hover(
	                function () {
	                    $(this).children(".shut").css("display","block");
	                },
	                function () {
	                    $(this).children(".shut").css("display","none");
	                }
	            );
	        });
            var filter_offset = $("#data_filter").offset();
	        $(window).resize(function () {
	            filter_offset = $("#data_filter").offset();
	        });
	        var ui_offset = [];
	        $(".ui").each(function () {
	            ui_offset.push($(this).offset().left);
	        });
	        $(window).scroll(function () {
	            var scrollLeft = $(window).scrollLeft();
	            $("#data_filter").offset({left:filter_offset.left+scrollLeft});
	            i=0;
	            $(".ui").each(function () {
	                $(this).offset({left:ui_offset[i++]+scrollLeft});
	            });
	        });
        });
    </script>
    <script>
	    var deleteRow = function () {
	        var row = $(this).closest("tr").get(0);
            $('.dataTable').dataTable().fnDeleteRow(row);
	    };
	    var filterFlask = function (filter_type) {
	        var url = location.href.split("&remove=")[0].split("&show=")[0];
	        checked_flasks = [];
	        $("tr td").children(".cb").each(function () {
	            if (this.checked) {
	                checked_flasks.push(this.name);
	            }
	        });
		var removed_flask_ids,kept_flask_ids;
	        location.href.split("&").forEach(function (s) {
	            if (s.indexOf("remove") >= 0) {
	                removed_flask_ids = s.split("=")[1];
	            }
	            else if (s.indexOf("show") >= 0) {
	                kept_flask_ids = s.split("=")[1];
	            }
            });
	        if (filter_type == "remove") {
	            query_string = typeof kept_flask_ids != "undefined" ? "&show=" + kept_flask_ids:"";
	            query_string += typeof removed_flask_ids != "undefined" ? "&remove=" + removed_flask_ids.replace("}",""):"&remove={";
	        }
	        else if (filter_type == "show") {
	            query_string = "&show={";
	        }
	        checked_flasks.forEach(function (id) {
	            query_string += id + ",";
	        });
	        query_string += "}";
	        window.location.replace(url + query_string);
	    }
    </script>
</head>

<h4>Gene Protein Structure</h4>
<p>
    <div id='picked-atom-name' style='text-align:left; '>&nbsp;</div>
    <div id="viewer" style='text-align:left;'></div>
</p>

</body>
<script type="text/javascript" src="/static/bio-pv.min.js"></script>
<script>
var parent = document.getElementById('viewer');
var viewer = pv.Viewer(parent, { width : 800, height : 600, antialias : true, fog: false, background: 'white'});

function setColorForAtom(go, atom, color) {
    var view = go.structure().createEmptyView();
    view.addAtom(atom);
    go.colorBy(pv.color.uniform(color), view);
}

// variable to store the previously picked atom. Required for resetting the color
// whenever the mouse moves.
var prevPicked = null;
// add mouse move event listener to the div element containing the viewer. Whenever
// the mouse moves, use viewer.pick() to get the current atom under the cursor.
parent.addEventListener('mousemove', function(event) {
    var rect = viewer.boundingClientRect();
    var picked = viewer.pick({ x : event.clientX - rect.left,
                               y : event.clientY - rect.top });
    if (prevPicked !== null && picked !== null &&
        picked.target() === prevPicked.atom) {
      return;
    }
    if (prevPicked !== null) {
      // reset color of previously picked atom.
      setColorForAtom(prevPicked.node, prevPicked.atom, prevPicked.color);
    }
    if (picked !== null) {
      var atom = picked.target();
      document.getElementById('picked-atom-name').innerHTML = atom.qualifiedName();
      // get RGBA color and store in the color array, so we know what it was
      // before changing it to the highlight color.
      var color = [0,0,0,0];
      picked.node().getColorForAtom(atom, color);
      prevPicked = { atom : atom, color : color, node : picked.node() };

      setColorForAtom(picked.node(), atom, 'red');
    } else {
      document.getElementById('picked-atom-name').innerHTML = '&nbsp;';
      prevPicked = null;
    }
    viewer.requestRedraw();
});
pv.io.fetchPdb('{{ pdb_file_path }}', function(structure) {
    // put this in the viewerReady block to make sure we don't try to add the
    // object before the viewer is ready. In case the viewer is completely
    // loaded, the function will be immediately executed.
    viewer.on('viewerReady', function() {
      var go = viewer.cartoon('molecule', structure);
      // adjust center of view and zoom such that all structures can be seen.

      viewer.autoZoom();
    });
});
</script>

</html>
