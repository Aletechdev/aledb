<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN"
   "http://www.w3.org/TR/html4/strict.dtd">
<html>
    <head>
        <meta charset="utf-8">
        <title>Resequencing Runs</title>
        <script type="text/javascript" src="/static/jquery-1.9.1.min.js"></script> 
        <script type="text/javascript" src="/static/tablesorter/jquery.tablesorter.js"></script>
        <link rel="stylesheet" href="/static/tablesorter/themes/blue/style.css" type="text/css" media="print, projection, screen" />
        <script type="text/javascript">
            var asInitVals = new Array();
            $(document).ready($(function() {
                oTable = $("#runs").tablesorter({widgets: ['zebra']});

            }));
        </script>
    </head>
    <body>
    <table id="runs" class="tablesorter"><thead><tr><th>Run name</th><th># Predicted mutations</th><th>Mean coverage</th><th>Reads</th><th>Average Read length</th></tr></thead>
    <tbody>
    {% for experiment in experiments %}
        <tr><td>{{experiment.get_isolate_name}}</td><td>{{experiment.mutations.count}}</td><td>{{experiment.mean_coverage}}</td><td>{{experiment.reads}}</td><td>{{experiment.average_read_length}}</td></tr>
    {% endfor %}
    </tbody>
    </body>
</html>
