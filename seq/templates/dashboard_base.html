<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN"
        "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
    <meta charset="utf-8">
    {% block title %}{% endblock %}
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap-theme.min.css">
    <link rel="shortcut icon" type="image/png" href="/static/favicon.ico">
    <style>
            body {
                padding-right: 50px;
                padding-bottom: 25px;
                padding-left: 50px;
            }
        </style>
    {% block scripts_and_style %}{% endblock %}
</head>
<body>
<div class="page-header">
    <div style="float:right"><img src="/static/header.png" style="width:269px;height:53px"></div>
    <h1><a href="/" style="color:black; text-decoration:none">ALE Analytics</a>{% block header %}{% endblock %}</h1>
</div>
<ul class="nav nav-pills">
    <li role="presentation" {% block ale %}{% endblock %}><a href="/">ALE Experiments</a></li>
    <li role="presentation" {% block dash %}{% endblock %}><a href="/dashboard">Dashboard</a></li>
    <li role="presentation" {% block search %}{% endblock %}><a href="/search">Search</a></li>
    <li role="presentation" {% block filter %}{% endblock %}><a href="/filter/global_filter">Filter</a></li>
</ul><br>
{% block content %}{% endblock %}
</body>
</html>
