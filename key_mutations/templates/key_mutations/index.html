<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN"
        "http://www.w3.org/TR/html4/strict.dtd">

<html>
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <script type="text/javascript" src="/static/DataTables/media/js/jquery.js"></script>

  <link rel="stylesheet" type="text/css" href="/static/DataTables/media/css/jquery.dataTables.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap-theme.min.css">

  <style type="text/css" title="currentStyle">
      @import "/static/DataTables/extras/TableTools/media/css/TableTools.css";

      .FixedHeader_Cloned th {
          background-color: white;
          opacity: 0.5;
      }

      .intergenic {
          font-style: italic;
      }

      .mutation_in_codon {
          color: red;
          text-decoration: underline;
      }

      .reference_error {
          text-decoration: line-through;
      }

      #true {
          background-color: rgba(0, 255, 0, 0.1)
      }

      #empty {
          background-color: rgba(255, 0, 0, 0.1)
      }

      body {
          padding-right: 50px;
          padding-bottom: 25px;
          padding-left: 50px;
      }
  </style>

  <script type="text/javascript" charset="utf8" src="/static/DataTables/media/js/jquery.dataTables.js"></script>
  <script type="text/javascript" charset="utf8"
          src="/static/DataTables/extras/FixedHeader/js/FixedHeader.js"></script>
  <script type="text/javascript" charset="utf8"
          src="/static/DataTables/extras/ColReorder/media/js/ColReorder.js"></script>
  <script type="text/javascript" charset="utf8"
          src="/static/DataTables/extras/TableTools/media/js/TableTools.min.js"></script>
  <script type="text/javascript">
      $(document).ready(function () {
          var oTable = $("#data").dataTable({"bPaginate": false, "bAutoWidth": false}).fnSort([[1, 'asc']]);
          $("tr td:first-child").each(function () {
              $(this).hover(
                      function () {
                          $(this).children(".shut").css("display", "block");
                      },
                      function () {
                          $(this).children(".shut").css("display", "none");
                      }
              );
          });
          var filter_offset = $("#data_filter").offset();
          $(window).resize(function () {
              filter_offset = $("#data_filter").offset();
          });
          var ui_offset = [];
          $(".ui").each(function () {
              ui_offset.push($(this).offset().left);
          });
          $(window).scroll(function () {
              var scrollLeft = $(window).scrollLeft();
              $("#data_filter").offset({left: filter_offset.left + scrollLeft});
              i = 0;
              $(".ui").each(function () {
                  $(this).offset({left: ui_offset[i++] + scrollLeft});
              });
          });
      });
  </script>
  <script>
      var deleteRow = function () {
          var row = $(this).closest("tr").get(0);
          $('.dataTable').dataTable().fnDeleteRow(row);
      };
      var filterFlask = function (filter_type) {
          var url = location.href.split("&remove=")[0].split("&show=")[0];
          checked_flasks = [];
          $("tr td").children(".cb").each(function () {
              if (this.checked) {
                  checked_flasks.push(this.name);
              }
          });
          var removed_flask_ids, kept_flask_ids;
          location.href.split("&").forEach(function (s) {
              if (s.indexOf("remove") >= 0) {
                  removed_flask_ids = s.split("=")[1];
              }
              else if (s.indexOf("show") >= 0) {
                  kept_flask_ids = s.split("=")[1];
              }
          });
          if (filter_type == "remove") {
              query_string = typeof kept_flask_ids != "undefined" ? "&show=" + kept_flask_ids : "";
              query_string += typeof removed_flask_ids != "undefined" ? "&remove=" + removed_flask_ids.replace("}", "") : "&remove={";
          }
          else if (filter_type == "show") {
              query_string = "&show={";
          }
          checked_flasks.forEach(function (id) {
              query_string += id + ",";
          });
          query_string += "}";
          window.location.replace(url + query_string);
      }
  </script>
  <script>
      function filter_dups() {
          if ($('#show_dups').is(":checked")) {
              $('.dataTable').dataTable().fnFilter('');
          } else {
              $('.dataTable').dataTable().fnFilter("^(.(?!DUP))*$", null, true, false);
          }
      }
  </script>
</head>
<body>
<div class="page-header">
    <div style="float:right"><img src="/static/header.png" style="width:269px;height:53px"></div>
    <h1><a href="/ale_analytics/" style="color:black; text-decoration:none">ALE Analytics </a></h1>
</div>
<ul class="nav nav-pills">
    <li role="presentation" class="active"><a href="/ale_analytics">ALE Experiments</a></li>
    <li role="presentation"><a href="dashboard">Dashboard</a></li>
    <li role="presentation"><a href="search">Search</a></li>
</ul>
<br><br>

  <table id="data", class="tablesorter">
      <thead>
      {{ table_header }}
      </thead>
      <tbody>
      {{ table_body }}
      </tbody>
  </table>
</body>
</html>
