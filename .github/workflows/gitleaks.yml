# Scan the repository for leaked secrets on every PR and on every push to
# master. Uses the official gitleaks Docker image (free, MIT-licensed); the
# paid gitleaks/gitleaks-action@v2 is intentionally avoided.
#
# Configuration lives in .gitleaks.toml at the repo root. That file extends
# gitleaks' default ruleset and allowlists the known false positives in the
# genome-diff (.gd) test fixtures.
#
# To run manually: GitHub → Actions → gitleaks → "Run workflow".

name: gitleaks

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  scan:
    name: scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks scans all commits, not just the latest

      - name: Run gitleaks via Docker
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            zricethezav/gitleaks:v8.21.2 \
            detect --source /repo --config /repo/.gitleaks.toml --no-banner --verbose
